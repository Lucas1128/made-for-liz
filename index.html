<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  </head>
  <body>
    <div class="container">
        <figure class="text-center">
            <h1 class="display-1">The Relationship Purity Test!</h1>
            <h3 class="display-6">Made With Like x</h3>
        </figure>
    </div>

    <form>
        <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
        <label class="form-check-label" for="flexCheckDefault">1. Said "I like you"?</label>
        </div>

        <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
        <label class="form-check-label" for="flexCheckDefault">2. Asked/Been Asked to be exclusive?</label>
        </div>

        <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
        <label class="form-check-label" for="flexCheckDefault">3. Dated?</label>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous">
        const purityForm = document.querySelector('form');

        purityForm.addEventListener('submit', function(event) {
            event.preventDefault(); // Stop the form from traditional submission

            // Count checked boxes
            const checkedCount = document.querySelectorAll('input[type="checkbox"]:checked').length;

            // Redirect to results.html with the score attached to the URL
            window.location.href = `results.html?score=${checkedCount}`;
        });
    </script>
  </body>
</html>
