<style>
    /* Create a permanent "safe zone" on the right side of the form */
    .test-container {
        padding-right: 220px; 
    }

    /* We apply this to the specific questions holding an image */
    .has-image {
        position: relative; 
    }

    /* The "Little Frame" */
    .photo-frame {
        background: white;
        padding: 10px 10px 25px 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        border: 1px solid #eee;
        width: 180px; 
        position: absolute;
        /* Push the image exactly into the safe zone we made above */
        right: -200px; 
        top: -30px; 
        z-index: 10;
        pointer-events: none; /* Prevents the image from blocking clicks on the checkbox */
    }

    .photo-frame img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* Random Rotations */
    .rotate-left { transform: rotate(-7deg); }
    .rotate-right { transform: rotate(6deg); }
    .rotate-slight { transform: rotate(3deg); }

    /* On mobile screens, scale the images down so they still fit on the side! */
    @media (max-width: 768px) {
        .test-container {
            padding-right: 120px; /* Smaller safe zone */
        }
        .photo-frame {
            width: 100px; /* Smaller polaroids */
            right: -110px;
            padding: 5px 5px 15px 5px;
            top: -10px;
        }
    }
</style>
