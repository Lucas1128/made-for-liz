<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container text-center mt-5">
        <h1 class="display-1">Your Score</h1>
        <p class="display-4 text-primary" id="displayScore">0</p>
        <a href="index.html" class="btn btn-outline-secondary">Take it again</a>
    </div>

    <script>
        // 1. Get the 'score' parameter from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const score = urlParams.get('score');

        // 2. Display the score in the HTML element
        if (score !== null) {
            document.getElementById('displayScore').textContent = score;
        }
    </script>
</body>
</html>
